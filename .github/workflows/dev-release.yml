# Copyright (C) 2026 Techdelight BV

name: Dev Release

on:
  push:
    branches:
      - development
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build Dev Binary
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="$(cat VERSION)-dev+$(git rev-parse --short HEAD)"
          go build -ldflags="-s -w -X github.com/techdelight/daedalus/core.Version=$VERSION" -o daedalus-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/daedalus
          go build -ldflags="-s -w" -o skill-catalog-mcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/skill-catalog-mcp

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            daedalus-${{ matrix.goos }}-${{ matrix.goarch }}
            skill-catalog-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    name: Create Dev Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/binaries-*/daedalus-* release-assets/
          cp artifacts/binaries-*/skill-catalog-mcp-* release-assets/
          cp claude.json install.sh setup.sh config.json docker-compose.yml Dockerfile entrypoint.sh settings.json logo.txt scripts/wsl2-network.bat release-assets/
          sed -i 's/RELEASE_TAG="__RELEASE_TAG__"/RELEASE_TAG="dev"/' release-assets/install.sh

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev Build (${{ github.event.head_commit.timestamp && format('{0}', github.event.head_commit.timestamp) || 'manual' }})"
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          body: |
            ## Rolling Dev Build

            This is an **automated pre-release** built from the latest `development` branch.
            It may be unstable — use a [stable release](https://github.com/techdelight/daedalus/releases/latest) for production.

            **Commit:** ${{ github.sha }}
            **Compare:** [Changes since last release](https://github.com/techdelight/daedalus/compare/...development)

            ### Install

            ```bash
            curl -fsSL https://github.com/techdelight/daedalus/releases/download/dev/install.sh | bash
            ```

            This downloads the dev binary, runtime files, and creates a PATH symlink. See `install.sh --help` for options.
          files: release-assets/*
