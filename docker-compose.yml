services:
  claude:
    image: ${IMAGE:-techdelight/claude-runner:dev}
    user: "claude"
    volumes:
      - "${PROJECT_DIR}:/workspace"
      - "${CACHE_DIR}:/home/claude"
    environment:
      - RUNNER=${RUNNER:-claude}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stdin_open: true
    tty: true
    mem_limit: 4g
    cpus: "2.0"
    pids_limit: 512
