<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daedalus — Web Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
    <div id="app">
        <!-- Project List View -->
        <div id="project-view">
            <header>
                <h1>Daedalus</h1>
                <button class="btn btn-filter" id="filter-active-btn" onclick="toggleFilter()">Active Only</button>
                <span class="status" id="refresh-status"></span>
            </header>
            <div id="status-msg" class="status-msg"></div>
            <div class="project-list">
                <table>
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Status</th>
                            <th>Target</th>
                            <th>Last Used</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="project-tbody">
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display:none">
                    No registered projects.
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            <div class="dashboard-header">
                <span class="project-name" id="dashboard-project-name"></span>
                <button class="btn btn-back" onclick="showProjectList()">Back</button>
            </div>
            <div class="dashboard-content">
                <div class="dashboard-card">
                    <div class="dashboard-label">Progress</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="dashboard-progress-bar"></div>
                        <span class="progress-text" id="dashboard-progress-text">0%</span>
                    </div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-label">Version</div>
                    <div class="dashboard-value" id="dashboard-version">&mdash;</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-label">Sessions</div>
                    <div class="dashboard-value" id="dashboard-sessions">0</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-label">Total Time</div>
                    <div class="dashboard-value" id="dashboard-time">&mdash;</div>
                </div>
                <div class="dashboard-card dashboard-card-wide">
                    <div class="dashboard-label">Vision</div>
                    <div class="dashboard-value dashboard-vision" id="dashboard-vision">&mdash;</div>
                </div>
            </div>
        </div>

        <!-- Terminal View -->
        <div id="terminal-view">
            <div class="terminal-header">
                <span class="project-name" id="terminal-project-name"></span>
                <div class="terminal-header-actions">
                    <button class="btn btn-select" id="mobile-select-btn">Select</button>
                    <button class="btn btn-back" onclick="showProjectList()">Back</button>
                </div>
            </div>
            <div id="select-overlay">
                <div class="select-overlay-header">
                    <button class="btn btn-done" id="select-done-btn">Done</button>
                </div>
                <pre id="select-overlay-text"></pre>
            </div>
            <div id="terminal-container"></div>
            <div id="mobile-input-area">
                <textarea id="mobile-input" placeholder="Type command..." rows="1"
                          autocomplete="off" autocorrect="off" autocapitalize="off"
                          spellcheck="false"></textarea>
                <button class="btn btn-send" id="mobile-send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="/static/terminal.js"></script>
    <script>
        let refreshTimer = null;
        let filterActive = localStorage.getItem('daedalus-filter-active') === 'true';

        function toggleFilter() {
            filterActive = !filterActive;
            localStorage.setItem('daedalus-filter-active', filterActive);
            updateFilterButton();
            fetchProjects();
        }

        function updateFilterButton() {
            const btn = document.getElementById('filter-active-btn');
            if (filterActive) {
                btn.classList.add('active');
                btn.textContent = 'Active Only';
            } else {
                btn.classList.remove('active');
                btn.textContent = 'Active Only';
            }
        }

        async function fetchProjects() {
            try {
                const resp = await fetch('/api/projects');
                const projects = await resp.json();
                renderProjects(projects);
                document.getElementById('refresh-status').textContent =
                    'Updated ' + new Date().toLocaleTimeString();
            } catch (err) {
                setStatus('Failed to fetch projects: ' + err.message);
            }
        }

        function renderProjects(projects) {
            const tbody = document.getElementById('project-tbody');
            const empty = document.getElementById('empty-state');

            if (filterActive) {
                projects = projects.filter(p => p.running);
            }

            if (projects.length === 0) {
                tbody.innerHTML = '';
                empty.textContent = filterActive ? 'No running projects.' : 'No registered projects.';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td><a class="project-link" href="#" onclick="showDashboard('${escapeHtml(p.name)}'); return false;">${escapeHtml(p.name)}</a></td>
                    <td>
                        <span class="status-badge">
                            <span class="status-dot ${p.running ? 'running' : 'stopped'}"></span>
                            ${p.running ? 'running' : 'stopped'}
                        </span>
                    </td>
                    <td>${escapeHtml(p.target)}</td>
                    <td>${escapeHtml(relativeTime(p.lastUsed))}</td>
                    <td class="actions">
                        ${p.running
                            ? `<button class="btn btn-attach" onclick="attachProject('${escapeHtml(p.name)}')">Attach</button>
                               <button class="btn btn-stop" onclick="stopProject('${escapeHtml(p.name)}')">Stop</button>`
                            : `<button class="btn btn-start" onclick="startProject('${escapeHtml(p.name)}')">Start</button>
                               <button class="btn btn-rename" onclick="renameProject('${escapeHtml(p.name)}')">Rename</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function startProject(name) {
            setStatus('Starting ' + name + '...');
            try {
                const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/start`, {method: 'POST'});
                if (!resp.ok) {
                    const text = await resp.text();
                    setStatus('Error: ' + text);
                    return;
                }
                setStatus('Started ' + name);
                fetchProjects();
            } catch (err) {
                setStatus('Error: ' + err.message);
            }
        }

        async function stopProject(name) {
            setStatus('Stopping ' + name + '...');
            try {
                const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/stop`, {method: 'POST'});
                if (!resp.ok) {
                    const text = await resp.text();
                    setStatus('Error: ' + text);
                    return;
                }
                setStatus('Stopped ' + name);
                fetchProjects();
            } catch (err) {
                setStatus('Error: ' + err.message);
            }
        }

        async function renameProject(name) {
            const newName = prompt('Rename "' + name + '" to:');
            if (!newName || newName.trim() === '') return;
            setStatus('Renaming ' + name + ' to ' + newName.trim() + '...');
            try {
                const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/rename`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({newName: newName.trim()})
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    setStatus('Error: ' + text);
                    return;
                }
                setStatus('Renamed ' + name + ' to ' + newName.trim());
                fetchProjects();
            } catch (err) {
                setStatus('Error: ' + err.message);
            }
        }

        async function showDashboard(name) {
            // Stop refresh
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
            // Fetch dashboard data
            const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/dashboard`);
            if (!resp.ok) { setStatus('Error loading dashboard'); return; }
            const data = await resp.json();
            // Populate UI
            document.getElementById('dashboard-project-name').textContent = data.name;
            document.getElementById('dashboard-progress-bar').style.width = data.progressPct + '%';
            document.getElementById('dashboard-progress-text').textContent = data.progressPct + '%';
            document.getElementById('dashboard-version').textContent = data.projectVersion || '\u2014';
            document.getElementById('dashboard-sessions').textContent = data.sessionCount;
            document.getElementById('dashboard-time').textContent = formatDuration(data.totalTimeSec);
            document.getElementById('dashboard-vision').textContent = data.vision || '\u2014';
            // Show dashboard view
            document.getElementById('project-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('active');
        }

        function formatDuration(totalSec) {
            if (!totalSec) return '\u2014';
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            if (h > 0) return h + 'h ' + m + 'm';
            return m + 'm';
        }

        function attachProject(name) {
            document.title = name + ' \u2014 Daedalus';

            // Switch to terminal view
            document.getElementById('project-view').classList.add('hidden');
            document.getElementById('terminal-view').classList.add('active');
            document.getElementById('terminal-project-name').textContent = name;

            // Stop auto-refresh while in terminal
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }

            connectTerminal(name);
        }

        function showProjectList() {
            document.title = 'Daedalus \u2014 Web Dashboard';
            disconnectTerminal();

            document.getElementById('terminal-view').classList.remove('active');
            document.getElementById('dashboard-view').classList.remove('active');
            document.getElementById('project-view').classList.remove('hidden');

            fetchProjects();
            refreshTimer = setInterval(fetchProjects, 5000);
        }

        function setStatus(msg) {
            document.getElementById('status-msg').textContent = msg;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function relativeTime(iso) {
            if (!iso) return '';
            const date = new Date(iso);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'just now';
            if (diff < 3600) {
                const m = Math.floor(diff / 60);
                return m === 1 ? '1 min ago' : m + ' min ago';
            }
            if (diff < 86400) {
                const h = Math.floor(diff / 3600);
                return h === 1 ? '1 hour ago' : h + ' hours ago';
            }
            const d = Math.floor(diff / 86400);
            return d === 1 ? '1 day ago' : d + ' days ago';
        }

        // Initial load
        updateFilterButton();
        fetchProjects();
        refreshTimer = setInterval(fetchProjects, 5000);
    </script>
</body>
</html>
