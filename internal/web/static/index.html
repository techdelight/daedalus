<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daedalus — Web Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
    <div id="app">
        <!-- Project List View -->
        <div id="project-view">
            <header>
                <h1>Daedalus</h1>
                <span class="status" id="refresh-status"></span>
            </header>
            <div id="status-msg" class="status-msg"></div>
            <div class="project-list">
                <table>
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Status</th>
                            <th>Target</th>
                            <th>Last Used</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="project-tbody">
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display:none">
                    No registered projects.
                </div>
            </div>
        </div>

        <!-- Terminal View -->
        <div id="terminal-view">
            <div class="terminal-header">
                <span class="project-name" id="terminal-project-name"></span>
                <button class="btn btn-back" onclick="showProjectList()">Back</button>
            </div>
            <div id="terminal-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="/static/terminal.js"></script>
    <script>
        let refreshTimer = null;

        async function fetchProjects() {
            try {
                const resp = await fetch('/api/projects');
                const projects = await resp.json();
                renderProjects(projects);
                document.getElementById('refresh-status').textContent =
                    'Updated ' + new Date().toLocaleTimeString();
            } catch (err) {
                setStatus('Failed to fetch projects: ' + err.message);
            }
        }

        function renderProjects(projects) {
            const tbody = document.getElementById('project-tbody');
            const empty = document.getElementById('empty-state');

            if (projects.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td>${escapeHtml(p.name)}</td>
                    <td>
                        <span class="status-badge">
                            <span class="status-dot ${p.running ? 'running' : 'stopped'}"></span>
                            ${p.running ? 'running' : 'stopped'}
                        </span>
                    </td>
                    <td>${escapeHtml(p.target)}</td>
                    <td>${escapeHtml(relativeTime(p.lastUsed))}</td>
                    <td class="actions">
                        ${p.running
                            ? `<button class="btn btn-attach" onclick="attachProject('${escapeHtml(p.name)}')">Attach</button>
                               <button class="btn btn-stop" onclick="stopProject('${escapeHtml(p.name)}')">Stop</button>`
                            : `<button class="btn btn-start" onclick="startProject('${escapeHtml(p.name)}')">Start</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function startProject(name) {
            setStatus('Starting ' + name + '...');
            try {
                const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/start`, {method: 'POST'});
                if (!resp.ok) {
                    const text = await resp.text();
                    setStatus('Error: ' + text);
                    return;
                }
                setStatus('Started ' + name);
                fetchProjects();
            } catch (err) {
                setStatus('Error: ' + err.message);
            }
        }

        async function stopProject(name) {
            setStatus('Stopping ' + name + '...');
            try {
                const resp = await fetch(`/api/projects/${encodeURIComponent(name)}/stop`, {method: 'POST'});
                if (!resp.ok) {
                    const text = await resp.text();
                    setStatus('Error: ' + text);
                    return;
                }
                setStatus('Stopped ' + name);
                fetchProjects();
            } catch (err) {
                setStatus('Error: ' + err.message);
            }
        }

        function attachProject(name) {
            // Switch to terminal view
            document.getElementById('project-view').classList.add('hidden');
            document.getElementById('terminal-view').classList.add('active');
            document.getElementById('terminal-project-name').textContent = name;

            // Stop auto-refresh while in terminal
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }

            connectTerminal(name);
        }

        function showProjectList() {
            disconnectTerminal();

            document.getElementById('terminal-view').classList.remove('active');
            document.getElementById('project-view').classList.remove('hidden');

            fetchProjects();
            refreshTimer = setInterval(fetchProjects, 5000);
        }

        function setStatus(msg) {
            document.getElementById('status-msg').textContent = msg;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function relativeTime(iso) {
            if (!iso) return '';
            const date = new Date(iso);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'just now';
            if (diff < 3600) {
                const m = Math.floor(diff / 60);
                return m === 1 ? '1 min ago' : m + ' min ago';
            }
            if (diff < 86400) {
                const h = Math.floor(diff / 3600);
                return h === 1 ? '1 hour ago' : h + ' hours ago';
            }
            const d = Math.floor(diff / 86400);
            return d === 1 ? '1 day ago' : d + ' days ago';
        }

        // Initial load
        fetchProjects();
        refreshTimer = setInterval(fetchProjects, 5000);
    </script>
</body>
</html>
